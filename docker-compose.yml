services:
  postgres:
    image: postgres:16
    container_name: tikrd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tikrd
      POSTGRES_PASSWORD: tikrd_password
      POSTGRES_DB: tikrd
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: